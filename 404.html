<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Opening Lazidential…</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
       background:#0a3d2e;color:#eafff8;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;text-align:center;padding:24px}
  h1{font-size:22px;margin:0}
  p{color:#9fd4c4;font-size:14px;margin:0;line-height:1.5}
  a.btn{background:#06d6a0;color:#063b2c;font-weight:800;font-size:18px;text-decoration:none;
        padding:16px 40px;border-radius:14px;display:inline-block}
  .hint{color:#6b9e8c;font-size:12px;max-width:280px}
</style>
</head>
<body>
<h1>Lazidential</h1>
<p>Tap to open this page in the app:</p>
<a class="btn" id="open" href="#">📲 Open Lazidential</a>
<p class="hint">Once the Lazidential app (with app-link support) is installed, these links open the app directly — you won't see this page.</p>
<script>
  // GitHub Pages serves this 404 for every app path (house/27, receipts, …).
  // With the app installed + verified, Android never loads this page at all;
  // this is purely the not-installed / old-build fallback.
  var path = location.pathname.replace(/^\/+/, '') + location.search;
  var app = 'damco://' + path;
  var intent = 'intent://' + path + '#Intent;scheme=damco;package=com.damco.damco;end';
  var android = /android/i.test(navigator.userAgent);
  var target = android ? intent : app;
  document.getElementById('open').setAttribute('href', target);
  setTimeout(function () { window.location.href = target; }, 100);
</script>
</body>
</html>
